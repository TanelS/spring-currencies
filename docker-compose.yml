services:
  postgres:
    image: postgres:16
    container_name: currencies-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5451}:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data    # bind mount — visible in DataGrip/pgAdmin
